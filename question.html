<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <title>Bạn đang phân vân?</title>
    <link rel="icon" type="image/x-icon" href="Website Materials/favicon.ico">
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="question-page">

    <!-- NAVIGATION BAR -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-left">
          <div class="nav-controls">
            <button class="nav-btn" onclick="history.back()" title="Quay lại">&#8592;</button>
            <button class="nav-btn" onclick="history.forward()" title="Tiến tới">&#8594;</button>
            <button class="nav-btn" onclick="location.reload()" title="Tải lại">&#8635;</button>
          </div>
          <div class="nav-brand">Bright Ways</div>
        </div>
        <span class="nav-date" id="navDate"></span>
        <div class="nav-right">
          <ul class="nav-menu">
            <li><a href="index.html" class="nav-link">Trang chủ</a></li>
            <li><a href="Chat section/career.html" class="nav-link">Tư vấn AI</a></li>
            <li><a href="Quiz section/quiz.html" class="nav-link">Quiz</a></li>
            <li><a href="about.html" class="nav-link">Giới thiệu</a></li>
          </ul>
          <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </nav>

    <div class="question-container">
      <h1>Bạn đang phân vân về điều gì?</h1>
      <p class="question-subtitle">Hãy chọn các mục dưới đây</p>

      <!-- Nút chọn chuyển hướng -->
      <div class="options-grid">
        <div class="option-card">
          <button onclick="startQuiz()">
            <div class="option-text">
              <div class="option-title">Chọn chuyên ngành hẹp phù hợp</div>
              <div class="option-desc">Tìm chuyên ngành hẹp</div>
            </div>
          </button>
        </div>

        <div class="option-card">
          <button onclick="location.href='Chat section/career.html'">
            <div class="option-text">
              <div class="option-title">Cơ hội nghề nghiệp</div>
              <div class="option-desc">Tìm hiểu về các cơ hội nghề nghiệp trong
                tương lai</div>
            </div>
          </button>
        </div>
      </div>
    </div>

    <button id="musicToggle" onclick="toggleMusic()"
      class="music-btn">🔊</button>

    <audio id="bgMusic" loop>
      <source src="./Website Materials/music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
  </body>
</html>
