      <div class="nav-controls">
        <button class="nav-btn" onclick="history.back()" title="Quay lại">&#8592;</button>
        <button class="nav-btn" onclick="history.forward()" title="Tiến tới">&#8594;</button>
        <button class="nav-btn" onclick="location.reload()" title="Tải lại">&#8635;</button>
      </div>
      <div class="nav-brand">Bright Ways</div>

        <span></span>

      </div>
    </div>
  </div>
</nav>

<!-- STARTUP SCREEN -->
<div id="startup">
<img src="./Website Materials/logo.png" alt="Quiz AI Logo" class="logo">
</div>
<h1>Chọn nhóm ngành bạn đang theo học</h1>

<div class="container">

  <!-- CÔNG NGHỆ THÔNG TIN -->
  <div class="column active">
    <div class="column-title">Ngành Công nghệ thông tin</div>
    <div class="button-group">

      <button onclick="goQuestion('CNTT')">Công nghệ thông tin</button>
      <button onclick="goQuestion('SE')">Kỹ thuật phần mềm</button>
      <button onclick="goQuestion('AI')">Trí tuệ nhân tạo</button>
      <button onclick="goQuestion('IA')">An toàn thông tin</button>
      <button onclick="goQuestion('IC')">Vi mạch bán dẫn</button>
      <button onclick="goQuestion('AS')">Công nghệ ô tô số</button>
      <button onclick="goQuestion('IS')">Hệ thống thông tin</button>
      <button onclick="goQuestion('GD')">Thiết kế đồ hoạ & mỹ thuật số</button>
    </div>
  </div>

  <!-- TRUYỀN THÔNG -->
  <div class="column disabled">
    <div class="column-title">Ngành Công nghệ truyền thông</div>
    <button onclick="showToast()">Truyền thông đa phương tiện</button>
    <button onclick="showToast()">Quan hệ công chúng</button>
    <button onclick="showToast()">Marketing tích hợp</button>
    <button onclick="showToast()">Truyền thông thương hiệu</button>
  </div>

  <!-- NGÔN NGỮ -->
  <div class="column disabled">
    <div class="column-title">Khối Ngành Ngôn ngữ</div>
    <button onclick="showToast()">Ngôn ngữ Anh</button>
    <button onclick="showToast()">Tiếng Anh thương mại</button>
    <button onclick="showToast()">Ngôn ngữ Hàn Quốc</button>
    <button onclick="showToast()">Tiếng Trung thương mại</button>
  </div>

  <!-- LUẬT -->
  <div class="column disabled">
    <div class="column-title">Ngành Luật</div>
    <button onclick="showToast()">Luật</button>
    <button onclick="showToast()">Luật kinh tế</button>
  </div>

  <!-- QUẢN TRỊ -->
  <div class="column disabled">
    <div class="column-title">Quản trị kinh doanh</div>
    <button onclick="showToast()">Marketing</button>
    <button onclick="showToast()">Thương mại điện tử</button>
    <button onclick="showToast()">Business Analytics</button>
    <button onclick="showToast()">Fintech</button>
  </div>

</div>

<!-- TOAST -->
<div id="toast">Ngành này sẽ được phát triển trong thời gian tới 🚀</div>

<!-- NÚT BẬT / TẮT NHẠC -->
<button id="musicToggle" onclick="toggleMusic()" class="music-btn">🔊</button>

<audio id="bgMusic" loop>
  <source src="./Website Materials/music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
