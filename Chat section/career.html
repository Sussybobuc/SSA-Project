<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat</title>
    <link rel="icon" type="image/x-icon"
      href="../Website Materials/favicon.ico">
    <link rel="stylesheet" href="chat.css" />
  </head>
  <body>

    <!-- NAVIGATION BAR -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-left">
          <div class="nav-controls">
            <button class="nav-btn" onclick="history.back()" title="Quay lại">&#8592;</button>
            <button class="nav-btn" onclick="history.forward()" title="Tiến tới">&#8594;</button>
            <button class="nav-btn" onclick="location.reload()" title="Tải lại">&#8635;</button>
          </div>
          <div class="nav-brand">Bright Ways</div>
        </div>
        <span class="nav-date" id="navDate"></span>
        <div class="nav-right">
          <ul class="nav-menu">
            <li><a href="../index.html" class="nav-link">Trang chủ</a></li>
            <li><a href="career.html" class="nav-link active">Tư vấn AI</a></li>
            <li><a href="../Forum section/forum.html" class="nav-link">Diễn đàn</a></li>
            <li><a href="../Quiz section/quiz.html" class="nav-link">Quiz</a></li>
            <li><a href="../about.html" class="nav-link">Giới thiệu</a></li>
          </ul>
          <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </nav>

    <div class="chat-app">
      <!-- HEADER -->
      <header class="chat-header">
        <span>🤖 QuizAI</span>
      </header>

      <!-- CHAT CONTENT -->
      <main class="chat-body" id="chatBody">
        <div class="msg ai">
          <div class="bubble">
            Xin chào 👋 Tôi có thể giúp gì cho bạn?
          </div>
        </div>
      </main>

      <!-- INPUT -->
      <footer class="chat-input">
        <input id="career-question" type="text" placeholder="Nhập câu hỏi..." maxlength="500" />
        <button id="sendBtn">➤</button>
      </footer>
    </div>
    <button id="themeToggle" class="theme-btn">🌙</button>

    <div class="history-sidebar" id="historySidebar">
      <!-- TOGGLE BUTTON -->
      <button id="toggleHistory" class="toggle-history">☰</button>

      <div class="history-header">
        <h3>🕘 Lịch sử</h3>
        <button class="new-chat-btn" onclick="startNewChat()">+ Chat mới</button>
        <button class="clear-btn" onclick="openConfirm()">Xóa tất cả</button>
      </div>

      <ul id="aiHistoryList"></ul>
    </div>
    <!-- CONFIRM DELETE POPUP -->
    <div class="modal-overlay" id="confirmOverlay">
      <div class="confirm-modal">
        <h3>🗑️ Xóa toàn bộ lịch sử?</h3>
        <p>Hành động này không thể hoàn tác.</p>

        <div class="modal-actions">
          <button class="btn cancel" onclick="closeConfirm()">Hủy</button>
          <button class="btn danger" onclick="confirmClear()">Xóa</button>
        </div>
      </div>
    </div>
    <script src="chat.js"></script>
  </body>
</html>
